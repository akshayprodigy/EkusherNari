
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Bengali Themed Website</title>
    </head>

    <body>
      <div id="root"></div>
      <script>
        // GitHub Pages SPA redirect (pairs with public/404.html)
        (function (l) {
          if (l.search && l.search.startsWith('?/')) {
            const decoded = l.search
              .slice(2)
              .split('&')
              .map((s) => s.replace(/~and~/g, '&'))
              .join('?');
            window.history.replaceState(null, '', l.pathname + decoded + l.hash);
          }
        })(window.location);
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
